<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Gusttavo Corres</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html"><span class="brand-mark">GC</span><span><strong>Admin</strong><small>Gusttavo Corres</small></span></a>
    <nav><a href="index.html">Voltar à loja</a></nav>
  </header>
  <main class="admin-page">
    <section class="admin-card" id="loginBox">
      <h1>Painel administrativo</h1>
      <p>Entre com a senha de administrador para adicionar produtos.</p>
      <input type="password" id="adminPassword" placeholder="Senha admin" />
      <button class="btn primary" id="loginBtn">Entrar</button>
      <small>Senha configurada: Gu040310@</small>
    </section>

    <section class="admin-card hidden" id="adminBox">
      <div class="section-head">
        <div><p class="eyebrow">Produtos</p><h1>Cadastrar produto</h1></div>
        <button class="btn ghost" id="logoutBtn">Sair</button>
      </div>
      <form id="productForm" class="admin-form">
        <input id="pName" required placeholder="Nome do produto" />
        <input id="pPrice" required type="number" min="1" step="0.01" placeholder="Preço" />
        <input id="pImage" placeholder="URL da imagem" />
        <textarea id="pDescription" required placeholder="Descrição"></textarea>
        <button class="btn primary" type="submit">Salvar produto</button>
      </form>
      <div id="adminProducts" class="admin-list"></div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
